server { 
  listen 80;
  root {{ROOT_PATH}};
  index index.html index.htm index.php;
  server_name {{DOMAIN}};

  location / {
    try_files $uri $uri/ /index.php?$query_string;
    autoindex on;
    autoindex_exact_size off;
  }

  location ~ \.php$ {
    include snippets/fastcgi-php.conf;
    fastcgi_pass unix:/run/php/php8.3-fpm.sock;
  }

  location ~ /\.ht {
    deny all;
  }
}